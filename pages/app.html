<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DX Watch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/app.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@joergdietrich/leaflet.terminator/L.Terminator.js"></script>
<script src="/static/cookies.js"></script>
<script src="/static/map-grid.js"></script>
<script src="/static/map-core.js"></script>
<script src="/static/map-ui.js"></script>
<script src="/static/ws-client.js"></script>
<script src="/static/activity-dialog.js"></script>
<script src="/static/app-router.js"></script>
</head>
<body>
<div id="topbar">
  <div id="legend"></div>
  <div id="status" style="min-width: 560px;">
    <a href="/dx"         class="nav-link" data-path="/dx"         style="color:#aaa; margin-right:10px; text-decoration:none;">DX</a>
    <a href="/local"      class="nav-link" data-path="/local"      style="color:#aaa; margin-right:10px; text-decoration:none;">LOCAL</a>
    <a href="/my_dx"      class="nav-link" data-path="/my_dx"      style="color:#aaa; margin-right:10px; text-decoration:none;">MY DX</a>
    <a href="/dxpedition" class="nav-link" data-path="/dxpedition" style="color:#aaa; margin-right:10px; text-decoration:none;">DX-PEDITION</a>

    <span  id="viewLabel"    style="color:#aaa; display:none; margin-right:5px;"></span>
    <select id="modeSelect"  style="display:none;"></select>
    <select id="dxcallSelect" style="display:none;"><option value="">-- Select DX-pedition --</option></select>
    <button id="configBtn"   title="Set my callsign" style="display:none;">⚙</button>
    <span id="limitControl" style="display:none;">
      Limit: <span id="limitValue">1000</span>
      <input type="range" id="limitSlider" min="100" max="2000" step="100" value="1000">
    </span>
    <span id="statusDot"></span>
    <span id="statusText">initializing...</span>
  </div>
</div>
<div id="map"></div>

<div id="activityDialog">
  <div id="activityDialogTitleBar">
    <span id="activityDialogTitleText">Activity</span>
    <div class="act-title-btns">
      <button id="activityDialogRefresh" title="Refresh">&#x21BB;</button>
      <button id="activityDialogClose"   title="Close">&#x2715;</button>
    </div>
  </div>
  <div id="activityDialogBands"></div>
  <div id="activityDialogHeatmap"></div>
</div>

<dialog id="timeLimitDialog">
  <div class="dialog-header">
    <span class="dialog-title">Time Limit Reached</span>
    <button class="dialog-close" id="timeLimitCloseBtn" aria-label="Close">&#x2715;</button>
  </div>
  <p style="margin:0 0 12px 0;">Your allowed connection time has been used up. Please try again later.</p>
  <div class="dialog-buttons">
    <button class="btn-primary" id="timeLimitOkBtn">OK</button>
  </div>
</dialog>

<dialog id="mycallDialog">
  <div class="dialog-header">
    <span class="dialog-title">My Callsign</span>
    <button class="dialog-close" id="cancelBtn" aria-label="Close">&#x2715;</button>
  </div>
  <label class="dialog-label" for="mycallInput">Callsign</label>
  <input id="mycallInput" placeholder="e.g. JQ3IKN" autocomplete="off" autocapitalize="characters" spellcheck="false"/>
  <div class="dialog-buttons">
    <button class="btn-secondary" id="cancelBtn2">Cancel</button>
    <button class="btn-primary"   id="saveBtn">Save</button>
  </div>
</dialog>

<script>
window.addEventListener('load', function () { window.PskRouter.init(); });
</script>
</body>
</html>
