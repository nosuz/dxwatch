<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DX Watch: MyDX</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/app.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@joergdietrich/leaflet.terminator/L.Terminator.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="/static/cookies.js"></script>
<script src="/static/map-grid.js"></script>
<script src="/static/map-core.js"></script>
<script src="/static/map-ui.js"></script>
<script src="/static/mqtt-client.js"></script>
</head>
<body>
<div id="topbar">
  <div id="legend"></div>
  <div id="status" style="min-width: 560px;">
    <a href="/dx" style="color:#aaa; margin-right:10px; text-decoration:none;">DX</a>
    <a href="/local" style="color:#aaa; margin-right:10px; text-decoration:none;">LOCAL</a>
    <a href="/my_dx" style="color:#0ff; margin-right:10px; text-decoration:none;">MY DX</a>
    <a href="/dxpedition" style="color:#aaa; margin-right:15px; text-decoration:none;">DX-PEDITION</a>

    <span style="color:#aaa;">MyCall:</span>
    <input id="mycallInput" placeholder="e.g. JQ3IKN" />
    <button id="saveBtn">Save</button>
    <span id="statusText">status: initializing...</span>
  </div>
</div>
<div id="map"></div>
<script>
(function () {
  window.PskUi.fillLegend();

  const map = window.PskMap.createMap({
    center: [20, 0],
    zoom: 3,
    minZoom: 3,
    maxZoom: 11,
    maxBounds: [[-90, -200], [90, 200]],
    showGrid: true,
    showTerminator: true,
  });

  const statusEl = document.getElementById('statusText');
  const mycallInput = document.getElementById('mycallInput');
  const saveBtn = document.getElementById('saveBtn');
  const COOKIE_KEY = 'pskr_mycall';

  let mycall = (window.PskCookies.getCookie(COOKIE_KEY) || '').trim().toUpperCase();
  mycallInput.value = mycall;

  const mqttClient = window.PskMqttClient.createMqttClient({
    map,
    statusEl,
    colorMap: window.PskUi.COLOR_MAP,
    markerTtl: 180000,
  });

  mqttClient.startStatusTimer();

  function applyMyCall(newCall) {
    mycall = (newCall || '').trim().toUpperCase();
    mycallInput.value = mycall;

    if (!mycall) {
      window.PskCookies.setCookie(COOKIE_KEY, '', 0);
      mqttClient.disconnect();
      mqttClient.clearAll();
      if (statusEl) statusEl.textContent = 'status: enter your callsign';
      return;
    }

    window.PskCookies.setCookie(COOKIE_KEY, mycall, 365);
    mqttClient.connect(mycall);
  }

  saveBtn.addEventListener('click', function () {
    applyMyCall(mycallInput.value);
  });

  mycallInput.addEventListener('keydown', function (event) {
    if (event.key === 'Enter') applyMyCall(mycallInput.value);
  });

  if (mycall) {
    mqttClient.connect(mycall);
  } else {
    if (statusEl) statusEl.textContent = 'status: enter your callsign';
    mycallInput.focus();
  }

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      mqttClient.disconnect();
    } else if (mycall) {
      mqttClient.connect(mycall);
    }
  });
})();
</script>
</body>
</html>
