<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PSKReporter DX-pedition</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/app.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@joergdietrich/leaflet.terminator/L.Terminator.js"></script>
<script src="/static/map-grid.js"></script>
<script src="/static/map-core.js"></script>
<script src="/static/map-ui.js"></script>
<script src="/static/ws-client.js"></script>
<script src="/static/page-init.js"></script>
</head>
<body>
<div id="topbar">
  <div id="legend"></div>
  <div id="status" style="min-width: 360px;">
    <a href="/dx" style="color:#aaa; margin-right:10px; text-decoration:none;">DX</a>
    <a href="/local" style="color:#aaa; margin-right:10px; text-decoration:none;">LOCAL</a>
    <a href="/my_dx" style="color:#aaa; margin-right:10px; text-decoration:none;">MY DX</a>
    <a href="/dxpedition" style="color:#0ff; margin-right:15px; text-decoration:none;">DX-PEDITION</a>

    <select id="dxcallSelect">
      <option value="">-- Select DX-pedition --</option>
    </select>
    <span id="statusText">status: initializing...</span>
  </div>
</div>
<div id="map"></div>
<script>
fetch('/api/dxpeditions')
  .then(function (r) { return r.json(); })
  .then(function (list) {
    var sel = document.getElementById('dxcallSelect');
    list.forEach(function (d) {
      var opt = document.createElement('option');
      opt.value = d.callsign;
      opt.textContent = d.entity_name ? d.callsign + ' (' + d.entity_name + ')' : d.callsign;
      sel.appendChild(opt);
    });
    if (list.length === 1) {
      sel.value = list[0].callsign;
      sel.dispatchEvent(new Event('change'));
    }
  });

initPskReporterPage({
  mode: 'dxpedition',
  local: false,
  cookieKey: null,
  markerTtl: 900000,
  showStatus: true,
  dxcallSelectId: 'dxcallSelect',
  map: {
    center: [0, 0],
    zoom: 3,
    minZoom: 3,
    maxZoom: 11,
    maxBounds: [[-90, -200], [90, 200]],
    showGrid: true,
    showTerminator: true
  }
});
</script>
</body>
</html>
