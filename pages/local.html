<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DX Watch: Local</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/app.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@joergdietrich/leaflet.terminator/L.Terminator.js"></script>
<script src="/static/map-grid.js"></script>
<script src="/static/map-core.js"></script>
<script src="/static/map-ui.js"></script>
<script src="/static/ws-client.js"></script>
<script src="/static/page-init.js"></script>
<script src="/static/mqtt-keepalive.js"></script>
</head>
<body>
<div id="topbar">
  <div id="legend"></div>
  <div id="status" style="min-width: 420px;">
    <a href="/dx" style="color:#aaa; margin-right:10px; text-decoration:none;">DX</a>
    <a href="/local" style="color:#0ff; margin-right:10px; text-decoration:none;">LOCAL</a>
    <a href="/my_dx" style="color:#aaa; margin-right:10px; text-decoration:none;">MY DX</a>
    <a href="/dxpedition" style="color:#aaa; margin-right:15px; text-decoration:none;">DX-PEDITION</a>

    <span style="color:#aaa;">JP↔JP</span>
    <select id="modeSelect">
      <option value="from_jp">JP→JP (marker=RL)</option>
      <option value="to_jp">JP→JP (marker=SL)</option>
    </select>
    <span id="statusText">status: initializing...</span>
  </div>
</div>
<div id="map"></div>
<script>
initDXWatchPage({
  mode: 'from_jp',
  local: true,
  cookieKey: null,
  showStatus: true,
  map: {
    center: [36.2, 138.2],
    zoom: 5,
    minZoom: 5,
    maxZoom: 11,
    maxBounds: [[20.0, 122.0], [46.5, 154.0]],
    showGrid: true,
    showTerminator: true
  }
});
</script>
</body>
</html>
