services:
  web:
    image: dxwatch
    logging:
      driver: syslog
    environment:
      TZ: Asia/Tokyo
    build:
      context: .
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  update:
    image: dxwatch
    logging:
      driver: syslog
    volumes:
      - ./data:/app/data
    entrypoint: ["uv", "run", "python"]
    command: ["/app/dxpedition_cli.py"]
    restart: "no"
